version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cdi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cdi_user
      POSTGRES_PASSWORD: cdi_password
      POSTGRES_DB: cdi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cdi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdi_user -d cdi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: cdi-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - cdi-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cdi-server
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://cdi_user:cdi_password@postgres:5432/cdi_db
      MONGODB_URI: mongodb://mongodb:27017/cdi_db
      JWT_SECRET: cdi-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - cdi-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cdi-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - cdi-network

volumes:
  postgres_data:
  mongodb_data:

networks:
  cdi-network:
    driver: bridge
